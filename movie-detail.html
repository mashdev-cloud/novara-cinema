<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - Novara</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e50914;
            --primary-red-dark: #b20710;
            --primary-red-light: #ff2a2a;
            --dark-bg: #050505;
            --dark-bg-secondary: #0a0a0f;
            --dark-bg-tertiary: #12121a;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
            --text-light-gray: #e5e5e5;
            --transition-fast: 0.2s ease;
            --transition-medium: 0.4s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 18px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-white);
        }

        .logo-icon {
            font-size: 2rem;
            color: var(--primary-red);
        }

        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--text-white) 0%, var(--primary-red-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light-gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-white);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50px;
            color: var(--text-white);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--primary-red);
            transform: translateX(-5px);
        }

        /* Hero Backdrop */
        .movie-backdrop {
            position: relative;
            height: 70vh;
            min-height: 500px;
            overflow: hidden;
        }

        .backdrop-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.3);
        }

        .backdrop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(5,5,5,0.3) 0%, rgba(5,5,15,0.95) 70%, var(--dark-bg) 100%);
        }

        /* Movie Content */
        .movie-content {
            position: relative;
            margin-top: -200px;
            z-index: 10;
            padding: 0 60px;
        }

        .movie-header {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
        }

        .movie-poster {
            flex-shrink: 0;
            width: 320px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .movie-poster img {
            width: 100%;
            height: auto;
            display: block;
        }

        .movie-info {
            flex: 1;
        }

        .movie-badges {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .movie-badge {
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-trending { background: var(--primary-red); }
        .badge-new { background: #22c55e; }
        .badge-featured { background: #f59e0b; color: #000; }

        .movie-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem;
            letter-spacing: 3px;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .movie-meta-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            color: var(--text-gray);
        }

        .movie-year {
            color: var(--primary-red);
            font-weight: 600;
            font-size: 1.2rem;
        }

        .movie-duration {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(251, 191, 36, 0.15);
            border-radius: 6px;
        }

        .movie-rating i {
            color: #fbbf24;
        }

        .movie-rating span {
            color: #fbbf24;
            font-weight: 700;
        }

        .movie-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .movie-genre {
            padding: 8px 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            font-size: 0.9rem;
            color: var(--text-light-gray);
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .movie-genre:hover {
            background: var(--primary-red);
            color: white;
        }

        .movie-tagline {
            font-size: 1.3rem;
            color: var(--text-gray);
            font-style: italic;
            margin-bottom: 20px;
            padding-left: 20px;
            border-left: 3px solid var(--primary-red);
        }

        .movie-synopsis {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-light-gray);
            margin-bottom: 30px;
            max-width: 700px;
        }

        .movie-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 35px;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-red-dark) 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-medium);
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(229, 9, 20, 0.4);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 35px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-medium);
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-icon:hover {
            background: var(--primary-red);
            border-color: var(--primary-red);
        }

        /* Credits Section */
        .credits-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: var(--primary-red);
        }

        .director-info {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--dark-bg-secondary);
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .director-avatar {
            width: 60px;
            height: 60px;
            background: var(--primary-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .director-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .director-label {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .cast-member {
            text-align: center;
        }

        .cast-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--dark-bg-tertiary);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-gray);
            overflow: hidden;
        }

        .cast-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cast-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .cast-role {
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        /* Trailer Section */
        .trailer-section {
            margin-bottom: 50px;
        }

        .trailer-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: var(--dark-bg-secondary);
        }

        .trailer-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Similar Movies */
        .similar-movies {
            margin-bottom: 50px;
        }

        .movies-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        .movies-row::-webkit-scrollbar {
            height: 8px;
        }

        .movies-row::-webkit-scrollbar-track {
            background: var(--dark-bg-tertiary);
            border-radius: 4px;
        }

        .movies-row::-webkit-scrollbar-thumb {
            background: var(--primary-red);
            border-radius: 4px;
        }

        .mini-movie-card {
            flex-shrink: 0;
            width: 180px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .mini-movie-card:hover {
            transform: translateY(-5px);
        }

        .mini-poster {
            width: 180px;
            height: 270px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .mini-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mini-title {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mini-meta {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        /* Loading */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 100px 60px;
        }

        .error-icon {
            font-size: 4rem;
            color: var(--primary-red);
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .error-message {
            color: var(--text-gray);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .navbar { padding: 15px 30px; }
            .movie-content { padding: 0 30px; }
            .movie-header { flex-direction: column; align-items: center; text-align: center; }
            .movie-poster { width: 250px; }
            .movie-genres { justify-content: center; }
            .movie-actions { justify-content: center; }
            .movie-meta-row { justify-content: center; }
            .movie-title { font-size: 3rem; }
        }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .nav-links { display: none; }
            .movie-backdrop { height: 50vh; }
            .movie-content { padding: 0 20px; margin-top: -150px; }
            .movie-poster { width: 200px; }
            .movie-title { font-size: 2.2rem; }
            .movie-actions { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
            .cast-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="hero-landing.html" class="logo">
            <span class="logo-icon"><i class="fas fa-film"></i></span>
            <span class="logo-text">NOVARA</span>
        </a>
        
        <ul class="nav-links">
            <li><a href="hero-landing.html">Home</a></li>
            <li><a href="movies.html" class="active">Movies</a></li>
            <li><a href="#series">Series</a></li>
            <li><a href="#originals">Originals</a></li>
        </ul>

        <a href="movies.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Movies
        </a>
    </nav>

    <!-- Main Content -->
    <main id="mainContent">
        <!-- Loading State -->
        <div class="loading-container" style="min-height: 100vh;">
            <div class="loading-spinner"></div>
            <span>Loading movie details...</span>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentMovie = null;

        // Get movie ID from URL
        function getMovieId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // Load movie details
        async function loadMovie() {
            const movieId = getMovieId();
            
            if (!movieId) {
                showError('No movie specified');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/movies/${movieId}`);
                const result = await response.json();

                if (result.success) {
                    currentMovie = result.data;
                    renderMovieDetails(currentMovie);
                    loadSimilarMovies(currentMovie.genre, currentMovie.id);
                } else {
                    showError('Movie not found');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Unable to load movie details. Make sure the API is running.');
            }
        }

        // Render movie details
        function renderMovieDetails(movie) {
            document.title = `${movie.title} - Novara`;

            const badges = [];
            if (movie.trending) badges.push('<span class="movie-badge badge-trending">Trending</span>');
            if (movie.new_release) badges.push('<span class="movie-badge badge-new">New Release</span>');
            if (movie.featured) badges.push('<span class="movie-badge badge-featured">Featured</span>');

            const genres = movie.genre.map(g => 
                `<span class="movie-genre" onclick="filterByGenre('${g}')">${g}</span>`
            ).join('');

            const director = movie.director || 'Unknown';
            const directorInitials = director.split(' ').map(n => n[0]).join('').substring(0, 2);

            const cast = movie.cast.map((actor, index) => `
                <div class="cast-member">
                    <div class="cast-photo">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="cast-name">${actor}</div>
                    <div class="cast-role">Actor ${index + 1}</div>
                </div>
            `).join('');

            // YouTube video ID extraction
            const videoId = extractVideoId(movie.trailer_url);

            const html = `
                <!-- Hero Backdrop -->
                <div class="movie-backdrop">
                    <img src="${movie.backdrop || movie.poster}" alt="${movie.title}" class="backdrop-image">
                    <div class="backdrop-overlay"></div>
                </div>

                <!-- Movie Content -->
                <div class="movie-content">
                    <div class="movie-header">
                        <div class="movie-poster">
                            <img src="${movie.poster}" alt="${movie.title}">
                        </div>
                        
                        <div class="movie-info">
                            <div class="movie-badges">${badges.join('')}</div>
                            
                            <h1 class="movie-title">${movie.title}</h1>
                            
                            <div class="movie-meta-row">
                                <span class="movie-year">${movie.release_year}</span>
                                <span class="movie-duration">
                                    <i class="fas fa-clock"></i> ${movie.duration}
                                </span>
                                <div class="movie-rating">
                                    <i class="fas fa-star"></i>
                                    <span>${movie.rating}</span>/10
                                </div>
                            </div>
                            
                            <div class="movie-genres">${genres}</div>
                            
                            <p class="movie-tagline">Experience the unforgettable story</p>
                            
                            <p class="movie-synopsis">${movie.synopsis}</p>
                            
                            <div class="movie-actions">
                                <a href="#" class="btn-primary" onclick="playMovie()">
                                    <i class="fas fa-play"></i>
                                    Watch Now
                                </a>
                                <a href="#" class="btn-secondary" onclick="addToList()">
                                    <i class="fas fa-plus"></i>
                                    My List
                                </a>
                                <button class="btn-icon" onclick="shareMovie()" title="Share">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                                <button class="btn-icon" onclick="toggleFavorite()" title="Favorite">
                                    <i class="fas fa-heart"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Director -->
                    <section class="credits-section">
                        <h2 class="section-title"><i class="fas fa-video"></i> Director</h2>
                        <div class="director-info">
                            <div class="director-avatar">${directorInitials}</div>
                            <div>
                                <div class="director-name">${director}</div>
                                <div class="director-label">Director</div>
                            </div>
                        </div>
                    </section>

                    <!-- Cast -->
                    <section class="credits-section">
                        <h2 class="section-title"><i class="fas fa-users"></i> Cast</h2>
                        <div class="cast-grid">${cast}</div>
                    </section>

                    <!-- Trailer -->
                    <section class="trailer-section">
                        <h2 class="section-title"><i class="fas fa-film"></i> Trailer</h2>
                        <div class="trailer-container">
                            ${videoId ? 
                                `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0" allowfullscreen></iframe>` :
                                `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-gray);">
                                    <div style="text-align:center;">
                                        <i class="fas fa-film" style="font-size:3rem;margin-bottom:15px;"></i>
                                        <p>Trailer not available</p>
                                    </div>
                                </div>`
                            }
                        </div>
                    </section>

                    <!-- Similar Movies -->
                    <section class="similar-movies">
                        <h2 class="section-title"><i class="fas fa-clapperboard"></i> You May Also Like</h2>
                        <div class="movies-row" id="similarMovies"></div>
                    </section>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        // Extract YouTube video ID
        function extractVideoId(url) {
            if (!url) return null;
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        // Load similar movies
        async function loadSimilarMovies(genres, excludeId) {
            try {
                const response = await fetch(`${API_BASE}/movies`);
                const result = await response.json();

                if (result.success) {
                    const similar = result.data
                        .filter(m => m.id !== excludeId && m.genre.some(g => genres.includes(g)))
                        .slice(0, 6);

                    const container = document.getElementById('similarMovies');
                    container.innerHTML = similar.map(movie => `
                        <div class="mini-movie-card" onclick="goToMovie(${movie.id})">
                            <div class="mini-poster">
                                <img src="${movie.poster}" alt="${movie.title}">
                            </div>
                            <div class="mini-title">${movie.title}</div>
                            <div class="mini-meta">${movie.release_year} • ${movie.rating} ★</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading similar movies:', error);
            }
        }

        // Navigation functions
        function filterByGenre(genre) {
            window.location.href = `movies.html?genre=${encodeURIComponent(genre)}`;
        }

        function goToMovie(id) {
            window.location.href = `movie-detail.html?id=${id}`;
        }

        function playMovie() {
            alert('Playing movie... This would start playback!');
        }

        function addToList() {
            alert('Added to your list!');
        }

        function shareMovie() {
            if (navigator.share) {
                navigator.share({
                    title: currentMovie.title,
                    text: currentMovie.synopsis,
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        }

        function toggleFavorite() {
            alert('Toggled favorite!');
        }

        // Show error
        function showError(message) {
            document.getElementById('mainContent').innerHTML = `
                <div class="error-container">
                    <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3 class="error-title">Oops!</h3>
                    <p class="error-message">${message}</p>
                    <a href="movies.html" class="btn-primary" style="margin-top:20px;">
                        <i class="fas fa-arrow-left"></i>
                        Back to Movies
                    </a>
                </div>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadMovie);
    </script>
</body>
</html>
